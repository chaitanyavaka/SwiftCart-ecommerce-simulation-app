<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Login | SwiftCart</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="login-body">
  <main class="login-screen">
    <section class="login-panel">
      <div class="brand login-brand">
        <span class="brand-mark">SC</span>
        <span>
          <strong>SwiftCart</strong>
          <small>marketplace control</small>
        </span>
      </div>
      <h1>Admin login</h1>
      <p>Access marketplace controls, agents, orders and loyalty operations.</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}
      <form method="post" class="login-form">
        <label>
          Username
          <input name="username" value="admin" autocomplete="username" required>
        </label>
        <label>
          Password
          <input name="password" type="password" value="demo123" autocomplete="current-password" required>
        </label>
        <button class="button primary full" type="submit">Log in</button>
      </form>
    </section>
  </main>
</body>
</html>
